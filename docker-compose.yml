version: '3.8'

services:
  emby:
    image: lscr.io/linuxserver/emby:latest
    container_name: emby
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
    volumes:
      - ./config:/config
      - ./media:/media
      - ./cache:/cache
    ports:
      - "8096:8096"
      - "8920:8920"
    restart: unless-stopped
